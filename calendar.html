<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AstroQuant — Forward Calendar 2026-2027</title>
<style>
:root {
  --indigo:#1e1b4b; --saffron:#f59e0b; --bg:#f8fafc; --text:#0f172a; --muted:#64748b;
  --border:#e2e8f0;
  --prime:#16a34a; --high:#f59e0b; --watch:#3b82f6; --neutral:#94a3b8; --avoid:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
header{background:var(--indigo);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:18px;font-weight:700}
header .sub{font-size:12px;color:#a5b4fc;margin-top:2px}
.legend{display:flex;gap:16px;padding:12px 24px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.controls{padding:10px 24px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.controls label{font-size:12px;color:var(--muted)}
.controls select{font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:#fff}
.grid-wrap{padding:24px;overflow-x:auto}
.month-block{margin-bottom:32px}
.month-title{font-size:14px;font-weight:700;color:var(--indigo);margin-bottom:10px}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:700px}
.day-cell{border-radius:6px;padding:8px 10px;cursor:default;border:1px solid transparent;position:relative}
.day-cell:hover{border-color:#94a3b8;transform:scale(1.02)}
.day-date{font-size:10px;color:#64748b;margin-bottom:2px}
.day-name{font-size:9px;color:#94a3b8;margin-bottom:4px}
.day-score{font-size:16px;font-weight:700}
.day-class{font-size:10px;font-weight:600;margin-top:2px}
.badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:10px;margin-top:3px;font-weight:600}
.c-PRIME_TRADE{background:#dcfce7;border-color:#16a34a}
.c-HIGH_VOL{background:#fef9c3;border-color:#f59e0b}
.c-WATCH{background:#eff6ff;border-color:#3b82f6}
.c-NEUTRAL{background:#f8fafc;border-color:#e2e8f0}
.c-AVOID{background:#fef2f2;border-color:#dc2626}
.badge-dead{background:#fca5a5;color:#7f1d1d}
.badge-campaign{background:#a7f3d0;color:#064e3b}
.stats{display:flex;gap:16px;padding:12px 24px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat{text-align:center}
.stat .val{font-size:20px;font-weight:700;color:var(--indigo)}
.stat .lbl{font-size:11px;color:var(--muted)}
</style>
</head>

<header>

const COLOR = {
  PRIME_TRADE:'#15803d', HIGH_VOL:'#d97706', WATCH:'#2563eb', NEUTRAL:'#64748b', AVOID:'#dc2626'
};

function render() {
  const filter = document.getElementById('filterSel').value;
  let rows = DATA;
  if (filter === 'campaign') rows = rows.filter(r => r.campaign_window === 'True');
  else if (filter === 'dead') rows = rows.filter(r => r.dead_zone === 'True');
  else if (filter) rows = rows.filter(r => r.classification === filter);

  // Stats
  const counts = {};
  for (const d of DATA) counts[d.classification] = (counts[d.classification]||0)+1;
  const campaign_days = DATA.filter(r=>r.campaign_window==='True').length;
  const dead_days = DATA.filter(r=>r.dead_zone==='True').length;
  document.getElementById('stats').innerHTML = [
    ['PRIME TRADE','PRIME_TRADE','#16a34a'],
    ['HIGH VOL','HIGH_VOL','#f59e0b'],
    ['WATCH','WATCH','#3b82f6'],
    ['NEUTRAL','NEUTRAL','#94a3b8'],
    ['AVOID','AVOID','#dc2626'],
  ].map(([lbl,key,col]) =>
    `<div class="stat"><div class="val" style="color:${col}">${counts[key]||0}</div><div class="lbl">${lbl}</div></div>`
  ).join('') +
  `<div class="stat"><div class="val" style="color:#059669">${campaign_days}</div><div class="lbl">Campaign Days</div></div>` +
  `<div class="stat"><div class="val" style="color:#dc2626">${dead_days}</div><div class="lbl">Dead Zone Days</div></div>` +
  `<div class="stat"><div class="val" style="color:#1e1b4b">${DATA.length}</div><div class="lbl">Total Days</div></div>`;

  // Group by month
  const months = {};
  for (const r of rows) {
    const m = r.date.slice(0,7);
    if (!months[m]) months[m] = [];
    months[m].push(r);
  }

  const monthNames = {'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun',
    '07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};

  let html = '';
  for (const [m, days] of Object.entries(months)) {
    const [yr, mo] = m.split('-');
    html += `<div class="month-block"><div class="month-title">${monthNames[mo]} ${yr}</div><div class="week-grid">`;
    for (const d of days) {
      const cls = d.classification;
      const score = parseFloat(d.composite_score);
      const col = COLOR[cls];
      const badges = [];
      if (d.campaign_window === 'True') badges.push(`<span class="badge badge-campaign">CAMPAIGN</span>`);
      if (d.dead_zone === 'True') badges.push(`<span class="badge badge-dead">DEAD ZONE</span>`);
      html += `<div class="day-cell c-${cls}" title="${d.date} — ${cls} — Score:${score}">
        <div class="day-date">${d.date.slice(5)}</div>
        <div class="day-name">${d.day_of_week.slice(0,3)}</div>
        <div class="day-score" style="color:${col}">${score.toFixed(0)}</div>
        <div class="day-class" style="color:${col}">${cls.replace('_',' ')}</div>
        ${badges.join('')}
      </div>`;
    }
    html += '</div></div>';
  }
  document.getElementById('calGrid').innerHTML = html || '<p style="padding:24px;color:#64748b">No days match the selected filter.</p>';
}

render();
</script>
