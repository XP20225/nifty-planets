name: Update Nifty Data

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 6:00 PM IST (12:30 UTC) every weekday
  workflow_dispatch:            # Also allows manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data.json (Nifty 50)
        run: python generate_data.py

      - name: Update ohlc_banknifty.json (Bank Nifty)
        run: python fetch_ohlc.py BANKNIFTY

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json ohlc_banknifty.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Data update $(date -u +'%Y-%m-%d')" && git push
